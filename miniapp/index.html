<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dating Mini App</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>💕 Dating MVP</h1>
      <div class="actions">
        <button id="shareBtn" type="button">Share</button>
      </div>
    </header>

    <section id="status" class="status">Connecting…</section>

    <section id="profileSection" class="panel hidden">
      <h2 id="profileTitle">Complete profile</h2>
      <form id="profileForm">
        <input name="name" placeholder="Name" required maxlength="64" />
        <input name="age" type="number" min="18" max="100" placeholder="Age" required />
        <select name="gender" required>
          <option value="">Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
        <select name="looking_for" required>
          <option value="">Looking for</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
        <input name="city" placeholder="City" maxlength="120" list="citySuggestions" autocomplete="new-password" />
        <textarea name="bio" placeholder="Bio" maxlength="500"></textarea>
        <label class="fileLabel">
          <span>Photo</span>
          <input id="profilePhotoInput" name="photo_file" type="file" accept="image/*" multiple />
        </label>
        <button type="submit">Save profile</button>
      </form>
    </section>

    <section id="swipeSection" class="panel hidden">
      <h2 id="swipeTitle">Swipe</h2>
      <article id="candidateCard" class="card"></article>
      <div class="swipeButtons">
        <button id="dislikeBtn" type="button">⬅️ Pass</button>
        <button id="likeBtn" type="button">❤️ Like</button>
      </div>
    </section>

    <section id="myProfileSection" class="panel hidden">
      <h2 id="myProfileTitle">My profile</h2>
      <div id="myProfileCard" class="card"></div>
    </section>

    <section id="settingsSection" class="panel hidden">
      <h2 id="settingsTitle">Settings</h2>
      <form id="settingsForm">
        <input name="name" placeholder="Name" required maxlength="64" />
        <input name="age" type="number" min="18" max="100" placeholder="Age" required />
        <input name="city" placeholder="City" maxlength="120" list="citySuggestions" autocomplete="new-password" />
        <textarea name="bio" placeholder="Bio" maxlength="500"></textarea>
        <label class="fileLabel">
          <span>Language</span>
          <select id="languageSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="hi">हिंदी</option>
            <option value="es">Español</option>
            <option value="ru">Русский</option>
          </select>
        </label>
        <div class="row">
          <input name="min_age" type="number" min="18" max="100" placeholder="Partner age from" required />
          <input name="max_age" type="number" min="18" max="100" placeholder="Partner age to" required />
        </div>
        <label class="fileLabel">
          <span>Update photos</span>
          <input id="settingsPhotoInput" name="photo_file" type="file" accept="image/*" multiple />
        </label>
        <div class="row">
          <button type="submit">Save settings</button>
        </div>
      </form>
    </section>

    <section id="messagesSection" class="panel hidden">
      <h2 id="matchesTitle">Matches</h2>
      <div id="matchesList" class="list"></div>

      <section id="chatSection" class="hidden">
        <h3 id="chatTitle">Chat</h3>
        <div id="chatMessages" class="chat"></div>
        <div class="chatComposer">
          <textarea id="chatInput" placeholder="Type message" maxlength="2000" rows="3"></textarea>
          <button id="sendBtn" type="button">Send</button>
        </div>
      </section>
    </section>

    <section id="giftsSection" class="panel hidden">
      <h2 id="receivedGiftsTitle">Received gifts</h2>
      <div id="giftsList" class="list"></div>
    </section>

    <nav id="bottomNav" class="bottomNav hidden">
      <button id="navSettingsBtn" type="button" class="navBtn">⚙️ Settings</button>
      <button id="navMessagesBtn" type="button" class="navBtn">💬 Messages</button>
      <button id="navSwipeBtn" type="button" class="navBtn">❤️ Swipe</button>
    </nav>
    <div class="bottomNavSpacer"></div>

    <datalist id="citySuggestions"></datalist>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
